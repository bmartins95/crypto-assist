<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/icons/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#17171a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"
    />
    <title>Datum - Sua carteira, consolidada</title>
    <style>
      /* Simple ring, not the pulsing brand-logo LoadingState uses — this has to render
         before React (and the brand SVG) is even loaded, so it stays intentionally
         minimal. Its only job is making sure this gap is never a blank/black screen. */
      #boot-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      }
      #boot-loader .ring {
        width: 40px; height: 40px; border-radius: 50%;
        border: 3px solid rgba(45, 212, 191, .25); border-top-color: #2dd4bf;
        animation: boot-spin 1s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      // Hard navigations (OAuth round trips, the Cognito logout redirect) briefly show
      // the browser's default white background before any CSS loads — this blocking,
      // pre-paint script sets the correct dark/light background immediately, matching
      // ThemeContext's own resolution logic, so that gap reads as the app's own
      // background instead of a jarring white flash.
      (function () {
        var stored = localStorage.getItem('crypto-assist:theme');
        var dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        }
        document.documentElement.style.background = dark ? '#101013' : '#f4f4f5';
      })();
    </script>
  </head>
  <body>
    <!--
      Visible the instant the document paints — well before the JS module below is
      fetched/parsed/executed. Without this, every hard navigation (OAuth round trip,
      logout redirect, first visit) has a genuinely empty window between "page starts
      loading" and "React has mounted anything." main.tsx removes this node right
      after its first render, so it's never seen alongside real app content.
    -->
    <div id="boot-loader"><div class="ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
