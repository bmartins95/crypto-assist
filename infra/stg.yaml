name: datum
cognito:
  domain: datum-stg
  googleEnabled: false
  web:
    callbackUrls:
      - https://stg.datum.bumalabs.net/auth/callback
      - https://d2xhrsd3sjdaob.cloudfront.net/auth/callback
      - http://localhost:5173/auth/callback
    logoutUrls:
      - https://stg.datum.bumalabs.net
      - https://d2xhrsd3sjdaob.cloudfront.net
      - http://localhost:5173
