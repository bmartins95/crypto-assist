name: Deploy

on:
  push:
    branches: [develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install -r requirements-dev.txt
        working-directory: backend
      - run: pytest --cov=app --cov-fail-under=80
        working-directory: backend
      - run: bandit -r app/ -ll
        working-directory: backend
      - run: pip-audit
        working-directory: backend
      - run: npm ci
        working-directory: web
      - run: npm run coverage
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm audit --audit-level=high
        working-directory: web

  # ── dev (automatic) ───────────────────────────────────────────────────────

  register-dev:
    name: Register dev
    needs: test
    uses: bmartins95/aws-shared-pipeline/.github/workflows/register-infra.yml@master
    with:
      app_name: datum
      stage: dev
    secrets: inherit

  deploy-dev:
    name: Deploy dev
    needs: register-dev
    uses: bmartins95/aws-shared-pipeline/.github/workflows/deploy-stage.yml@master
    with:
      app_name: datum
      stage: dev
      stack: python-sst
    secrets: inherit

  # ── stg (manual approval) ─────────────────────────────────────────────────

  approve-stg:
    name: Approve stg
    needs: deploy-dev
    environment: stg
    runs-on: ubuntu-latest
    steps:
      - run: echo "Approved for stg"

  register-stg:
    name: Register stg
    needs: approve-stg
    uses: bmartins95/aws-shared-pipeline/.github/workflows/register-infra.yml@master
    with:
      app_name: datum
      stage: stg
    secrets: inherit

  deploy-stg:
    name: Deploy stg
    needs: register-stg
    uses: bmartins95/aws-shared-pipeline/.github/workflows/deploy-stage.yml@master
    with:
      app_name: datum
      stage: stg
      stack: python-sst
      promote_branch: staging
    secrets: inherit

  # ── prod (manual approval) ────────────────────────────────────────────────

  approve-prod:
    name: Approve prod
    needs: deploy-stg
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - run: echo "Approved for prod"

  register-prod:
    name: Register prod
    needs: approve-prod
    uses: bmartins95/aws-shared-pipeline/.github/workflows/register-infra.yml@master
    with:
      app_name: datum
      stage: prod
    secrets: inherit

  deploy-prod:
    name: Deploy prod
    needs: register-prod
    uses: bmartins95/aws-shared-pipeline/.github/workflows/deploy-stage.yml@master
    with:
      app_name: datum
      stage: prod
      stack: python-sst
      promote_branch: master
    secrets: inherit
