name: Deploy

on:
  push:
    branches: [develop, staging, master]

env:
  AWS_REGION: us-east-1
  APP_NAME: crypto-assist

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            web/package-lock.json

      - run: npm ci
        working-directory: backend

      - run: npm ci
        working-directory: web

      - run: npm test
        working-directory: backend

      - run: npm test
        working-directory: web

  # ── dev (auto on push to develop) ─────────────────────────────────────────

  register-dev:
    name: Register dev
    needs: test
    if: github.ref_name == 'develop'
    uses: bmartins95/aws-shared-pipeline/.github/workflows/register-infra.yml@master
    with:
      app_name: crypto-assist
      stage: dev
    secrets:
      infra_github_token: ${{ secrets.INFRA_GITHUB_TOKEN }}

  deploy-dev:
    name: Deploy dev
    needs: register-dev
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    env:
      STAGE: dev
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Read SSM outputs
        id: ssm
        run: |
          get() { aws ssm get-parameter --name "$1" --query "Parameter.Value" --output text; }
          echo "pool_id=$(get /$APP_NAME/$STAGE/CognitoUserPoolId)" >> "$GITHUB_OUTPUT"
          echo "web_client_id=$(get /$APP_NAME/$STAGE/CognitoWebClientId)" >> "$GITHUB_OUTPUT"
          echo "cognito_domain=$(get /$APP_NAME/$STAGE/CognitoDomain)" >> "$GITHUB_OUTPUT"
      - run: npm ci
        working-directory: web
      - name: Build web
        run: npm run build
        working-directory: web
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.ssm.outputs.pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.ssm.outputs.web_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.ssm.outputs.cognito_domain }}
      # TODO: deploy backend to Lambda once sst.config.ts is added to backend/
      # TODO: sync web/dist/ to S3 + CloudFront invalidation once distribution is created

  # ── stg (manual approval on push to staging) ──────────────────────────────

  approve-stg:
    name: Approve stg
    needs: test
    if: github.ref_name == 'staging'
    environment: stg
    runs-on: ubuntu-latest
    steps:
      - run: echo "Approved for stg"

  register-stg:
    name: Register stg
    needs: approve-stg
    if: github.ref_name == 'staging'
    uses: bmartins95/aws-shared-pipeline/.github/workflows/register-infra.yml@master
    with:
      app_name: crypto-assist
      stage: stg
    secrets:
      infra_github_token: ${{ secrets.INFRA_GITHUB_TOKEN }}

  deploy-stg:
    name: Deploy stg
    needs: register-stg
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    env:
      STAGE: stg
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Read SSM outputs
        id: ssm
        run: |
          get() { aws ssm get-parameter --name "$1" --query "Parameter.Value" --output text; }
          echo "pool_id=$(get /$APP_NAME/$STAGE/CognitoUserPoolId)" >> "$GITHUB_OUTPUT"
          echo "web_client_id=$(get /$APP_NAME/$STAGE/CognitoWebClientId)" >> "$GITHUB_OUTPUT"
          echo "cognito_domain=$(get /$APP_NAME/$STAGE/CognitoDomain)" >> "$GITHUB_OUTPUT"
      - run: npm ci
        working-directory: web
      - name: Build web
        run: npm run build
        working-directory: web
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.ssm.outputs.pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.ssm.outputs.web_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.ssm.outputs.cognito_domain }}
      # TODO: deploy backend to Lambda once sst.config.ts is added to backend/
      # TODO: sync web/dist/ to S3 + CloudFront invalidation once distribution is created

  # ── prod (manual approval on push to master) ──────────────────────────────

  approve-prod:
    name: Approve prod
    needs: test
    if: github.ref_name == 'master'
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - run: echo "Approved for prod"

  register-prod:
    name: Register prod
    needs: approve-prod
    if: github.ref_name == 'master'
    uses: bmartins95/aws-shared-pipeline/.github/workflows/register-infra.yml@master
    with:
      app_name: crypto-assist
      stage: prod
    secrets:
      infra_github_token: ${{ secrets.INFRA_GITHUB_TOKEN }}

  deploy-prod:
    name: Deploy prod
    needs: register-prod
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    env:
      STAGE: prod
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Read SSM outputs
        id: ssm
        run: |
          get() { aws ssm get-parameter --name "$1" --query "Parameter.Value" --output text; }
          echo "pool_id=$(get /$APP_NAME/$STAGE/CognitoUserPoolId)" >> "$GITHUB_OUTPUT"
          echo "web_client_id=$(get /$APP_NAME/$STAGE/CognitoWebClientId)" >> "$GITHUB_OUTPUT"
          echo "cognito_domain=$(get /$APP_NAME/$STAGE/CognitoDomain)" >> "$GITHUB_OUTPUT"
      - run: npm ci
        working-directory: web
      - name: Build web
        run: npm run build
        working-directory: web
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.ssm.outputs.pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.ssm.outputs.web_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.ssm.outputs.cognito_domain }}
      # TODO: deploy backend to Lambda once sst.config.ts is added to backend/
      # TODO: sync web/dist/ to S3 + CloudFront invalidation once distribution is created
