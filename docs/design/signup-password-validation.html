<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#0b0b0d;font-family:'Inter',sans-serif;display:flex;justify-content:center;padding:60px 20px}
  input.dv-input{width:100%;box-sizing:border-box;background:#17171a;border-radius:8px;padding:11px 40px 11px 12px;color:#f4f4f5;font-size:14px;font-family:'Inter',sans-serif;outline:none}
  input.dv-input::placeholder{color:#52525b}
</style>
</helmet>

<div style="width:360px;background:#101013;border:1px solid #26262b;border-radius:12px;overflow:hidden;height:fit-content">
  <div style="background:#101013;padding:36px 28px 30px">
    <div style="display:flex;align-items:center;gap:6px;color:#a1a1aa;font-size:13px;margin-bottom:18px"><span>←</span><span>Voltar</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:22px">
      <div style="width:56px;height:56px;border-radius:14px;background:#17171a;border:1px solid #3a3a42;display:flex;align-items:center;justify-content:center">
        <svg width="30" height="30" viewBox="0 0 512 512"><path d="M148 118 L148 394 L232 394 C348 394 410 336 410 256 C410 176 348 118 232 118 Z" fill="none" stroke="#2dd4bf" stroke-width="34" stroke-linejoin="round"></path><circle cx="263" cy="256" r="34" fill="#f97316"></circle></svg>
      </div>
      <div style="text-align:center">
        <div style="font:700 20px 'Space Grotesk',sans-serif;color:#f4f4f5">Criar conta</div>
        <div style="color:#71717a;font-size:13px;margin-top:4px">Leva menos de um minuto.</div>
      </div>
    </div>

    <sc-if value="{{ serverError }}" hint-placeholder-val="{{ false }}">
      <div role="alert" style="display:flex;gap:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 12px;margin-bottom:16px;color:#fca5a5;font-size:12.5px;line-height:1.5">
        <span>⚠</span><span>{{ serverErrorText }}</span>
      </div>
    </sc-if>

    <label style="display:block;color:#a1a1aa;font-size:12.5px;margin-bottom:6px">Nome</label>
    <input class="dv-input" style="border:1px solid #26262b;margin-bottom:16px" value="bmartins" readonly="true"></input>

    <label style="display:block;color:#a1a1aa;font-size:12.5px;margin-bottom:6px">E-mail</label>
    <input class="dv-input" style="border:1px solid #26262b;margin-bottom:16px" value="bruno.martins@gmail.com" readonly="true"></input>

    <label style="display:block;color:#a1a1aa;font-size:12.5px;margin-bottom:6px">Senha</label>
    <div style="position:relative;margin-bottom:8px">
      <input class="dv-input" type="{{ pwInputType }}" placeholder="Crie uma senha" value="{{ password }}" onChange="{{ onPasswordChange }}" style="{{ pwBorderStyle }}"></input>
      <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#71717a;cursor:pointer;display:flex" title="Mostrar senha" onClick="{{ toggleShowPw }}">{{ eyeIconPw }}</span>
    </div>

    <sc-if value="{{ showStrength }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;gap:4px;margin-bottom:10px">
        <div style="height:4px;flex:1;border-radius:2px;background:{{ barColor0 }}"></div>
        <div style="height:4px;flex:1;border-radius:2px;background:{{ barColor1 }}"></div>
        <div style="height:4px;flex:1;border-radius:2px;background:{{ barColor2 }}"></div>
        <div style="height:4px;flex:1;border-radius:2px;background:{{ barColor3 }}"></div>
      </div>
      <div style="font-size:12px;font-weight:600;margin-bottom:12px;color:{{ strengthColor }}">{{ strengthLabel }}</div>
    </sc-if>

    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:18px">
      <sc-for list="{{ rules }}" as="rule" hint-placeholder-count="5">
        <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:{{ rule.color }}">
          <span style="color:{{ rule.iconColor }}">{{ rule.icon }}</span>{{ rule.label }}
        </div>
      </sc-for>
    </div>

    <label style="display:block;color:#a1a1aa;font-size:12.5px;margin-bottom:6px">Confirmar senha</label>
    <div style="position:relative;margin-bottom:6px">
      <input class="dv-input" type="{{ confirmInputType }}" placeholder="Repita a senha" value="{{ confirmPassword }}" onChange="{{ onConfirmChange }}" style="{{ confirmBorderStyle }}"></input>
      <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#71717a;cursor:pointer;display:flex" title="Mostrar senha" onClick="{{ toggleShowConfirm }}">{{ eyeIconConfirm }}</span>
    </div>
    <sc-if value="{{ showMismatch }}" hint-placeholder-val="{{ false }}">
      <div style="color:#ef4444;font-size:12px;margin-bottom:18px" role="alert">As senhas não coincidem</div>
    </sc-if>
    <sc-if value="{{ showMatch }}" hint-placeholder-val="{{ false }}">
      <div style="color:#2dd4bf;font-size:12px;margin-bottom:18px;display:flex;align-items:center;gap:5px">✓ As senhas coincidem</div>
    </sc-if>
    <sc-if value="{{ showNeitherHint }}" hint-placeholder-val="{{ true }}">
      <div style="margin-bottom:18px"></div>
    </sc-if>

    <button onClick="{{ onSubmit }}" disabled="{{ submitDisabled }}" style="{{ submitStyle }}">{{ submitLabel }}</button>
    <div style="text-align:center;color:#71717a;font-size:12.5px;margin-top:16px">Já tem conta? <span style="color:#2dd4bf;font-weight:600">Entrar</span></div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:760},&quot;demoServerError&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;user_exists&quot;,&quot;options&quot;:[&quot;none&quot;,&quot;password_leaked&quot;,&quot;user_exists&quot;],&quot;tsType&quot;:&quot;'none'|'password_leaked'|'user_exists'&quot;,&quot;section&quot;:&quot;Demo&quot;}}">
const RULES_DEF = [
  { key: 'len', label: 'Mínimo de 8 caracteres', test: p => p.length >= 8 },
  { key: 'upper', label: 'Letra maiúscula (A-Z)', test: p => /[A-Z]/.test(p) },
  { key: 'lower', label: 'Letra minúscula (a-z)', test: p => /[a-z]/.test(p) },
  { key: 'num', label: 'Número (0-9)', test: p => /[0-9]/.test(p) },
  { key: 'special', label: 'Caractere especial (^ $ * . [ ] etc.)', test: p => /[^A-Za-z0-9]/.test(p) },
];

const STRENGTH_LEVELS = [
  { label: 'Fraca', color: '#ef4444' },
  { label: 'Razoável', color: '#f97316' },
  { label: 'Boa', color: '#eab308' },
  { label: 'Forte', color: '#2dd4bf' },
];

class Component extends DCLogic {
  state = {
    password: '',
    confirmPassword: '',
    showPw: false,
    showConfirm: false,
    submitting: false,
    serverError: false, // false | 'password_leaked' | 'user_exists'
  };

  onPasswordChange = e => this.setState({ password: e.target.value, serverError: false });
  onConfirmChange = e => this.setState({ confirmPassword: e.target.value, serverError: false });
  toggleShowPw = () => this.setState(s => ({ showPw: !s.showPw }));
  toggleShowConfirm = () => this.setState(s => ({ showConfirm: !s.showConfirm }));

  onSubmit = () => {
    if (this.getCanSubmit()) {
      this.setState({ submitting: true, serverError: false });
      setTimeout(() => {
        // Demo: escolha o cenário em "demoServerError" nas Tweaks para ver
        // como cada erro do Cognito aparece (senha vazada ou e-mail/usuário já existente).
        const scenario = this.props.demoServerError || 'none';
        if (scenario !== 'none') {
          this.setState({ submitting: false, serverError: scenario });
        } else {
          this.setState({ submitting: false, serverError: false });
        }
      }, 900);
    }
  };

  getRuleResults(pw) {
    return RULES_DEF.map(r => ({ ...r, met: r.test(pw) }));
  }

  getCanSubmit() {
    const pw = this.state.password;
    const results = this.getRuleResults(pw);
    const allMet = results.every(r => r.met);
    const match = pw.length > 0 && pw === this.state.confirmPassword;
    return allMet && match && !this.state.submitting;
  }

  eyeIcon() {
    return React.createElement('svg', { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
      React.createElement('path', { d: 'M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z' }),
      React.createElement('circle', { cx: 12, cy: 12, r: 3 }));
  }

  eyeOffIcon() {
    return React.createElement('svg', { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
      React.createElement('path', { d: 'M3 3l18 18' }),
      React.createElement('path', { d: 'M10.6 5.2A11 11 0 0 1 12 5c7 0 11 7 11 7a17.7 17.7 0 0 1-3.2 3.9M6.6 6.6C3.9 8.3 2 12 2 12s4 7 11 7a10 10 0 0 0 4.4-1' }),
      React.createElement('path', { d: 'M9.9 9.9a3 3 0 0 0 4.2 4.2' }));
  }

  renderVals() {
    const pw = this.state.password;
    const rulesRaw = this.getRuleResults(pw);
    const metCount = rulesRaw.filter(r => r.met).length;
    const showStrength = pw.length > 0;
    const level = pw.length === 0 ? -1 : metCount <= 2 ? 0 : metCount === 3 ? 1 : metCount === 4 ? 2 : 3;
    const strength = level >= 0 ? STRENGTH_LEVELS[level] : { label: '', color: '#26262b' };

    const rules = rulesRaw.map(r => ({
      label: r.label,
      icon: r.met ? '✓' : '○',
      iconColor: r.met ? '#2dd4bf' : '#3a3a42',
      color: r.met ? '#71717a' : '#52525b',
    }));

    const barColors = [0, 1, 2, 3].map(i => {
      if (!showStrength) return '#26262b';
      return i <= level ? strength.color : '#26262b';
    });

    const confirm = this.state.confirmPassword;
    const showMismatch = confirm.length > 0 && confirm !== pw;
    const showMatch = confirm.length > 0 && confirm === pw;

    const canSubmit = this.getCanSubmit();
    const mkBorder = ok => `1px solid ${ok ? '#2dd4bf' : '#26262b'}`;

    return {
      password: pw,
      confirmPassword: confirm,
      pwInputType: this.state.showPw ? 'text' : 'password',
      confirmInputType: this.state.showConfirm ? 'text' : 'password',
      onPasswordChange: this.onPasswordChange,
      onConfirmChange: this.onConfirmChange,
      toggleShowPw: this.toggleShowPw,
      toggleShowConfirm: this.toggleShowConfirm,
      eyeIconPw: this.state.showPw ? this.eyeOffIcon() : this.eyeIcon(),
      eyeIconConfirm: this.state.showConfirm ? this.eyeOffIcon() : this.eyeIcon(),
      pwBorderStyle: { border: mkBorder(pw.length > 0 && metCount === 5), borderRadius: 8 },
      confirmBorderStyle: { border: showMismatch ? '1px solid #ef4444' : mkBorder(showMatch), borderRadius: 8 },
      showStrength,
      barColor0: barColors[0], barColor1: barColors[1], barColor2: barColors[2], barColor3: barColors[3],
      strengthLabel: strength.label,
      strengthColor: strength.color,
      rules,
      showMismatch,
      showMatch,
      showNeitherHint: !showMismatch && !showMatch,
      serverError: !!this.state.serverError,
      serverErrorText: this.state.serverError === 'user_exists'
        ? 'Este e-mail já está cadastrado. Tente entrar ou recuperar sua senha.'
        : 'Não foi possível criar a conta: essa senha apareceu em vazamentos conhecidos. Escolha outra senha.',
      submitDisabled: !canSubmit || this.state.submitting,
      submitLabel: this.state.submitting ? 'Criando conta…' : 'Criar conta',
      submitStyle: {
        width: '100%', boxSizing: 'border-box', background: canSubmit ? '#2dd4bf' : '#26262b',
        color: canSubmit ? '#062a26' : '#71717a', textAlign: 'center', border: 'none', borderRadius: 8,
        padding: '12px', fontWeight: 700, fontSize: 14, cursor: canSubmit ? 'pointer' : 'not-allowed',
        fontFamily: "'Inter',sans-serif",
      },
    };
  }
}
</script>
</body>
</html>
